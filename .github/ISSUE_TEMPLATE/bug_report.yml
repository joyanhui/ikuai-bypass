name: Bug 反馈
description: 提交问题帮助改进项目
title: "[Bug] "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        请先确认这是 **ikuai-bypass 本身的 Bug**。

        - 爱快使用问题、网络拓扑问题、Linux/Docker 使用问题，请移步 Discussions：
          https://github.com/joyanhui/ikuai-bypass/discussions
        - 如果是建议或功能需求，请描述使用场景和预期行为，并移步到 Discussions 区。
        - 必须提供清晰的复现步骤；无复现步骤且难以理解的 issue 会被直接关闭。

        如果觉得项目有帮助，请点亮 ⭐ Star 支持作者。

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述
      description: 请清晰描述你遇到的问题和实际表现。
      placeholder: 描述问题现象、报错信息、预期行为等。
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: 复现步骤
      description: 必填，请按步骤描述如何稳定复现该问题。
      placeholder: |
        1. 使用什么配置启动
        2. 执行了什么操作
        3. 出现了什么结果
    validations:
      required: true

  - type: checkboxes
    id: runtime-entry
    attributes:
      label: 使用入口
      description: 请选择你实际使用的 ikuai-bypass 入口，可多选。
      options:
        - label: GUI 图形 app
        - label: CLI 命令行版
    validations:
      required: true

  - type: checkboxes
    id: operating-system
    attributes:
      label: 运行操作系统
      description: 请选择运行 ikuai-bypass 的环境，可多选。
      options:
        - label: Windows
        - label: Linux
        - label: macOS
        - label: 爱快插件
        - label: 爱快 Docker
        - label: 群晖 Docker
        - label: FreeBSD
        - label: 安卓
        - label: iOS
    validations:
      required: true

  - type: input
    id: startup-args
    attributes:
      label: 启动命令参数
      description: 请填写你实际使用的启动命令或参数。
      placeholder: 例如：ikuai-bypass -c config.yml -tag home

  - type: input
    id: ikb-version
    attributes:
      label: ikuai-bypass 版本号
      placeholder: 例如：v4.4.104
    validations:
      required: true

  - type: input
    id: ikuai-version
    attributes:
      label: 爱快路由器版本号
      description: 必填，请填写爱快系统完整版本号。
      placeholder: 例如：3.7.20 Build20260101
    validations:
      required: true

  - type: textarea
    id: config-file
    attributes:
      label: 配置文件
      description: 必填，请粘贴完整可复现配置。该字段会自动以代码块方式渲染。
      placeholder: |
        请粘贴 config.yml 完整内容，并去掉敏感信息。
      render: yaml
    validations:
      required: true

  - type: textarea
    id: runtime-logs
    attributes:
      label: 运行日志
      description: 必填，请粘贴能定位问题的运行日志。该字段会自动以代码块方式渲染。
      placeholder: |
        请粘贴关键日志片段。
      render: text
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 补充信息
      description: 如有必要，请补充截图、报错弹窗、网络拓扑、控制台输出或其他有助于定位问题的信息。
      placeholder: |
        可以补充截图说明、更多日志、相关现象或其他上下文。
