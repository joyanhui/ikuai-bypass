name: Integration Tests

on:
  pull_request:
  push:
    tags-ignore:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-core-unit:
    name: CLI Core Unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: integration-smoke

      - name: Build CLI binary
        shell: bash
        run: cargo build --locked -p ikb-cli --bin ikb-cli

      - name: Run core unit tests
        shell: bash
        run: cargo test --locked -p ikb-core

  cli-smoke:
    name: CLI Smoke (${{ matrix.test_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        test_name:
          - simulator_api_surface_smoke
          - rule_sync_update_in_place_smoke
          - safe_before_smoke
          - clean_mode_smoke
          - clean_all_smoke
          - export_stream_domain_smoke
          - cli_modes_smoke
    env:
      CARGO_TERM_COLOR: always
      IKB_TEST_BACKEND: simulator
      IKB_TEST_FIXTURE_BIND_HOST: 127.0.0.1
      IKB_TEST_ARTIFACT_ROOT: ${{ github.workspace }}/apps/integration-tests/.artifacts
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: integration-smoke

      - name: Build CLI binary
        shell: bash
        run: cargo build --locked -p ikb-cli --bin ikb-cli

      - name: Run smoke case
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh "${{ matrix.test_name }}"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts-${{ matrix.test_name }}
          path: apps/integration-tests/.artifacts/
          if-no-files-found: ignore

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Frontend install dependencies
        shell: bash
        run: bun install --frozen-lockfile
        working-directory: frontends/app

      - name: Frontend type check
        shell: bash
        run: bun run check
        working-directory: frontends/app

      - name: Frontend unit tests
        shell: bash
        run: bun run test:ci
        working-directory: frontends/app

  tauri-tests:
    name: Tauri Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: integration-smoke

      - name: Tauri backend command tests
        shell: bash
        run: cargo test --locked -p ikb-app --test command_surface -- --nocapture
