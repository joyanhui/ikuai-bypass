name: Integration Tests

on:
  pull_request:
  push:
    tags-ignore:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-smoke:
    name: Simulator Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      IKB_TEST_BACKEND: simulator
      IKB_TEST_FIXTURE_BIND_HOST: 127.0.0.1
      IKB_TEST_ARTIFACT_ROOT: ${{ github.workspace }}/apps/integration-tests/.artifacts
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: integration-smoke

      - name: Run simulator smoke tests
        shell: bash
        run: bash apps/integration-tests/run-smoke-test.sh

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: apps/integration-tests/.artifacts/
          if-no-files-found: ignore
