name: Integration Tests

on:
  pull_request:
  push:
    tags-ignore:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-smoke:
    name: Integration Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      IKB_TEST_BACKEND: simulator
      IKB_TEST_FIXTURE_BIND_HOST: 127.0.0.1
      IKB_TEST_ARTIFACT_ROOT: ${{ github.workspace }}/apps/integration-tests/.artifacts
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: integration-smoke

      - name: Build CLI binary
        shell: bash
        run: cargo build --locked -p ikb-cli --bin ikb-cli

      - name: Run core unit tests
        shell: bash
        run: cargo test --locked -p ikb-core

      - name: Smoke - simulator_api_surface
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh simulator_api_surface_smoke

      - name: Smoke - rule_sync_update_in_place
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh rule_sync_update_in_place_smoke

      - name: Smoke - safe_before
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh safe_before_smoke

      - name: Smoke - clean_mode
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh clean_mode_smoke

      - name: Smoke - clean_all
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh clean_all_smoke

      - name: Smoke - export_stream_domain
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh export_stream_domain_smoke

      - name: Smoke - cli_modes
        shell: bash
        run: IKB_SMOKE_SKIP_SETUP=1 bash apps/integration-tests/run-smoke-test.sh cli_modes_smoke

      - name: Frontend install dependencies
        shell: bash
        run: bun install --frozen-lockfile
        working-directory: frontends/app

      - name: Frontend type check
        shell: bash
        run: bun run check
        working-directory: frontends/app

      - name: Frontend unit tests
        shell: bash
        run: bun run test:ci
        working-directory: frontends/app

      - name: Tauri backend command tests
        shell: bash
        run: cargo test --locked -p ikb-app --test command_surface -- --nocapture

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: apps/integration-tests/.artifacts/
          if-no-files-found: ignore
