name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布版本号，例如 v0.1.0；留空则自动生成 manually_年月日时分秒"
        required: false
        type: string
      build_mode:
        description: "构建范围"
        required: true
        default: minimal
        type: choice
        options:
          - minimal
          - full
      build_target:
        description: "构建目标"
        required: true
        default: cli+gui
        type: choice
        options:
          - cli+gui
          - cli
          - gui
      publish_release:
        description: "是否发布 GitHub Release"
        required: true
        type: boolean
        default: true
      push_docker:
        description: "是否推送 Docker 镜像"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'joyanhui/ikuai-bypass' }}

jobs:
  resolve-matrix:
    name: Resolve Release Meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      push_docker: ${{ steps.meta.outputs.push_docker }}
      docker_latest: ${{ steps.meta.outputs.docker_latest }}
      docker_creds_available: ${{ steps.meta.outputs.docker_creds_available }}
      build_mode: ${{ steps.matrix.outputs.build_mode }}
      build_target: ${{ steps.matrix.outputs.build_target }}
      cli_matrix: ${{ steps.matrix.outputs.cli_matrix }}
      cli_nightly_matrix: ${{ steps.matrix.outputs.cli_nightly_matrix }}
      bsd_matrix: ${{ steps.matrix.outputs.bsd_matrix }}
      gui_matrix: ${{ steps.matrix.outputs.gui_matrix }}
      gui_android_matrix: ${{ steps.matrix.outputs.gui_android_matrix }}
      gui_ios_matrix: ${{ steps.matrix.outputs.gui_ios_matrix }}
      docker_cli_matrix: ${{ steps.matrix.outputs.docker_cli_matrix }}
      docker_platforms: ${{ steps.matrix.outputs.docker_platforms }}
      has_cli: ${{ steps.matrix.outputs.has_cli }}
      has_cli_nightly: ${{ steps.matrix.outputs.has_cli_nightly }}
      has_bsd: ${{ steps.matrix.outputs.has_bsd }}
      has_gui: ${{ steps.matrix.outputs.has_gui }}
      has_gui_desktop: ${{ steps.matrix.outputs.has_gui_desktop }}
      has_gui_android: ${{ steps.matrix.outputs.has_gui_android }}
      has_gui_ios: ${{ steps.matrix.outputs.has_gui_ios }}
      has_linux_amd64_cli: ${{ steps.matrix.outputs.has_linux_amd64_cli }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          INPUT_PUBLISH_RELEASE: ${{ github.event.inputs.publish_release || 'true' }}
          INPUT_PUSH_DOCKER: ${{ github.event.inputs.push_docker || 'true' }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "push" ]]; then
            version="${REF_NAME}"
            publish_release="true"
            push_docker="true"
          else
            version="${INPUT_RELEASE_TAG}"
            publish_release="${INPUT_PUBLISH_RELEASE}"
            push_docker="${INPUT_PUSH_DOCKER}"
            if [[ -z "${version}" ]]; then
              version="manually_$(date +%Y%m%d%H%M%S)"
            fi
          fi

          lc_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]')"
          prerelease="false"
          if printf '%s' "${lc_version}" | grep -Eq '(alpha|beta|rc|pre|preview|dev|nightly|test|manually)'; then
            prerelease="true"
          fi

          docker_latest="false"
          if [[ "${prerelease}" != "true" && "${version}" =~ ^v[0-9]+(\.[0-9]+){1,2}$ ]]; then
            docker_latest="true"
          fi

          docker_creds_available="false"
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            docker_creds_available="true"
          fi

          if [[ "${push_docker}" == "true" && "${docker_creds_available}" != "true" ]]; then
            echo "Docker credentials are required when push_docker=true" >&2
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag_name=${version}"
            echo "prerelease=${prerelease}"
            echo "publish_release=${publish_release}"
            echo "push_docker=${push_docker}"
            echo "docker_latest=${docker_latest}"
            echo "docker_creds_available=${docker_creds_available}"
          } >> "${GITHUB_OUTPUT}"

      - id: matrix
        shell: bash
        env:
          INPUT_BUILD_MODE: ${{ github.event.inputs.build_mode || 'minimal' }}
          INPUT_BUILD_TARGET: ${{ github.event.inputs.build_target || 'cli+gui' }}
        run: |
          set -euo pipefail
          python <<'PY'
          import json
          import os
          import pathlib

          build_mode = os.environ.get("INPUT_BUILD_MODE", "minimal")
          build_target = os.environ.get("INPUT_BUILD_TARGET", "cli+gui")

          raw = pathlib.Path(".github/build_matrix.jsonc").read_text()
          lines = []
          for line in raw.splitlines():
              lines.append(line.split("//", 1)[0])
          matrix = json.loads("\n".join(lines))

          cli = [item for item in matrix["cli"] if build_mode in item["mode"]]
          cli_nightly = [item for item in matrix.get("cli_nightly", []) if build_mode in item["mode"]]
          bsd = [item for item in matrix.get("bsd", []) if build_mode in item["mode"]]
          gui = [item for item in matrix["gui"] if build_mode in item["mode"]]
          gui_android = [item for item in matrix.get("gui_android", []) if build_mode in item["mode"]]
          gui_ios = [item for item in matrix.get("gui_ios", []) if build_mode in item["mode"]]

          if build_target == "cli":
              gui = []
              gui_android = []
              gui_ios = []
          elif build_target == "gui":
              cli = []
              cli_nightly = []
              bsd = []

          docker_cli = [item for item in cli if item.get("docker_platform")]
          docker_platforms = ",".join(item["docker_platform"] for item in docker_cli)
          has_linux_amd64_cli = any(item["label"] == "linux-amd64" for item in cli)

          outputs = {
              "build_mode": build_mode,
              "build_target": build_target,
              "cli_matrix": json.dumps(cli, separators=(",", ":")),
              "cli_nightly_matrix": json.dumps(cli_nightly, separators=(",", ":")),
              "bsd_matrix": json.dumps(bsd, separators=(",", ":")),
              "gui_matrix": json.dumps(gui, separators=(",", ":")),
              "gui_android_matrix": json.dumps(gui_android, separators=(",", ":")),
              "gui_ios_matrix": json.dumps(gui_ios, separators=(",", ":")),
              "docker_cli_matrix": json.dumps(docker_cli, separators=(",", ":")),
              "docker_platforms": docker_platforms,
              "has_cli": str(bool(cli or cli_nightly or bsd)).lower(),
              "has_cli_nightly": str(bool(cli_nightly)).lower(),
              "has_bsd": str(bool(bsd)).lower(),
              "has_gui": str(bool(gui or gui_android or gui_ios)).lower(),
              "has_gui_desktop": str(bool(gui)).lower(),
              "has_gui_android": str(bool(gui_android)).lower(),
              "has_gui_ios": str(bool(gui_ios)).lower(),
              "has_linux_amd64_cli": str(has_linux_amd64_cli).lower(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")
          PY

  verify-cli:
    name: Verify CLI Source
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.has_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: verify-cli

      - name: Cargo check CLI
        run: cargo check -p ikb-cli

  build-frontend:
    name: Build Frontend Dist
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.has_gui == 'true' || needs.resolve-matrix.outputs.push_docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            app/frontend/node_modules
          key: frontend-bun-${{ hashFiles('app/frontend/bun.lock', 'app/frontend/package.json') }}
          restore-keys: |
            frontend-bun-

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: bun install --frozen-lockfile

      - name: Build frontend dist
        working-directory: app/frontend
        run: bun run build

      - name: Verify frontend dist
        run: test -f app/frontend/dist/index.html

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

  build-tauri-icons:
    name: Build Tauri Icons
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.has_gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cleanup stale cargo-tauri
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/cargo-tauri" "$HOME/.cargo/bin/tauri" \
            "$HOME/.install-action/bin/cargo-tauri" "$HOME/.install-action/bin/tauri" || true

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Generate Tauri icons
        working-directory: app/src-tauri
        run: cargo tauri icon icons/icon.png

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-icons
          path: app/src-tauri/icons

  build-cli:
    name: CLI ${{ matrix.label }}
    needs:
      - resolve-matrix
      - verify-cli
    if: needs.resolve-matrix.outputs.has_cli == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.cli_matrix) }}
    env:
      CARGO_TARGET_DIR: target-cli-${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> ${{ env.CARGO_TARGET_DIR }}
          cache-on-failure: true
          shared-key: cli-${{ matrix.label }}

      - name: Install cross
        if: runner.os == 'Linux' && matrix.builder == 'cross'
        run: cargo install cross --locked

      - name: Build CLI with cargo
        if: matrix.builder == 'cargo'
        run: cargo build --locked --release --target ${{ matrix.target }} -p ikb-cli

      - name: Build CLI with cross
        if: matrix.builder == 'cross'
        run: cross build --locked --release --target ${{ matrix.target }} -p ikb-cli

      - name: Package CLI artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_KIND: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          source .github/scripts/arch-helpers.sh
          mkdir -p release
          export package_base="$(ikb_cli_base "${TARGET}")"
          python <<'PY'
          import os
          import pathlib
          import shutil
          import tarfile
          import zipfile

          target = os.environ["TARGET"]
          archive_kind = os.environ["ARCHIVE_KIND"]
          package_base = os.environ["package_base"]
          release_dir = pathlib.Path("release")
          build_root = pathlib.Path(os.environ["CARGO_TARGET_DIR"])
          build_dir = build_root / target / "release"
          src = build_dir / ("ikb-cli.exe" if "windows" in target else "ikb-cli")
          if not src.exists():
              raise SystemExit(f"missing binary: {src}")

          stage = release_dir / f"{package_base}.stage"
          if stage.exists():
              shutil.rmtree(stage)
          stage.mkdir(parents=True)

          dst_name = "ikuai-bypass.exe" if "windows" in target else "ikuai-bypass"
          shutil.copy2(src, stage / dst_name)
          shutil.copy2("README.md", stage / "README.md")
          shutil.copy2("config.yml", stage / "config.yml")

          if archive_kind == "tar.gz":
              out = release_dir / f"{package_base}.tar.gz"
              if out.exists():
                  out.unlink()
              with tarfile.open(out, "w:gz") as tf:
                  for path in stage.rglob("*"):
                      tf.add(path, arcname=path.relative_to(stage))
          elif archive_kind == "zip":
              out = release_dir / f"{package_base}.zip"
              if out.exists():
                  out.unlink()
              with zipfile.ZipFile(out, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=5) as zf:
                  for path in stage.rglob("*"):
                      zf.write(path, path.relative_to(stage))
          else:
              raise SystemExit(f"unsupported archive kind: {archive_kind}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.label }}
          path: release/*

  build-cli-nightly:
    name: CLI nightly ${{ matrix.label }}
    needs:
      - resolve-matrix
      - verify-cli
    if: needs.resolve-matrix.outputs.has_cli_nightly == 'true'
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.cli_nightly_matrix) }}
    env:
      CARGO_TARGET_DIR: target-cli-nightly-${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install nightly rust-src
        run: rustup component add rust-src --toolchain nightly

      - name: Add nightly target
        run: rustup +nightly target add ${{ matrix.target }}
        continue-on-error: true

      - name: Install cross
        run: cargo install cross --locked

      - name: Verify cross binary
        shell: bash
        run: |
          set -euo pipefail
          command -v cross
          cross --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> ${{ env.CARGO_TARGET_DIR }}
          cache-on-failure: true
          shared-key: cli-nightly-${{ matrix.label }}

      - name: Build nightly CLI
        env:
          CARGO_UNSTABLE_BUILD_STD: "1"
          RUSTUP_TOOLCHAIN: nightly
        run: cross build --locked -Z build-std=std,panic_abort --release --target ${{ matrix.target }} -p ikb-cli

      - name: Package nightly CLI artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          source .github/scripts/arch-helpers.sh
          mkdir -p release
          export package_base="$(ikb_cli_base "${TARGET}")"
          python <<'PY'
          import os
          import pathlib
          import shutil
          import tarfile

          target = os.environ["TARGET"]
          package_base = os.environ["package_base"]
          release_dir = pathlib.Path("release")
          build_root = pathlib.Path(os.environ["CARGO_TARGET_DIR"])
          build_dir = build_root / target / "release"
          src = build_dir / "ikb-cli"
          if not src.exists():
              raise SystemExit(f"missing binary: {src}")

          stage = release_dir / f"{package_base}.stage"
          if stage.exists():
              shutil.rmtree(stage)
          stage.mkdir(parents=True)
          shutil.copy2(src, stage / "ikuai-bypass")
          shutil.copy2("README.md", stage / "README.md")
          shutil.copy2("config.yml", stage / "config.yml")

          out = release_dir / f"{package_base}.tar.gz"
          if out.exists():
              out.unlink()
          with tarfile.open(out, "w:gz") as tf:
              for path in stage.rglob("*"):
                  tf.add(path, arcname=path.relative_to(stage))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.label }}
          path: release/*

  build-lxc:
    name: LXC/Alpine Package
    needs:
      - resolve-matrix
      - build-cli
    if: needs.resolve-matrix.outputs.has_linux_amd64_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cli-linux-amd64
          path: release

      - name: Build LXC/Alpine package
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(find release -maxdepth 1 -type f -name 'ikuai-bypass-cli-x86_64-linux-musl.tar.gz' | head -1)"
          test -n "${tarball}"
          rm -rf stage-lxc
          mkdir -p stage-lxc
          tar -xzf "${tarball}" -C stage-lxc

          mkdir -p stage-lxc/usr/local/bin stage-lxc/etc/ikuai-bypass stage-lxc/usr/local/share/ikuai-bypass stage-lxc/etc/init.d stage-lxc/etc/runlevels/default
          mv stage-lxc/ikuai-bypass stage-lxc/usr/local/bin/ikuai-bypass
          chmod +x stage-lxc/usr/local/bin/ikuai-bypass

          if [ -f stage-lxc/config.yml ]; then
            mv stage-lxc/config.yml stage-lxc/etc/ikuai-bypass/config.yml
          fi
          if [ -f stage-lxc/README.md ]; then
            mv stage-lxc/README.md stage-lxc/usr/local/share/ikuai-bypass/README.md
          fi

          cat > stage-lxc/etc/init.d/ikuai-bypass <<'EOF'
          #!/sbin/openrc-run
          description="iKuai Bypass"

          command="/usr/local/bin/ikuai-bypass"
          command_args="-r cron -c /etc/ikuai-bypass/config.yml"
          command_background="yes"
          pidfile="/run/ikuai-bypass.pid"

          depend() {
            need net
          }
          EOF
          chmod +x stage-lxc/etc/init.d/ikuai-bypass
          ln -sf /etc/init.d/ikuai-bypass stage-lxc/etc/runlevels/default/ikuai-bypass

          tar -czf release/ikuai-bypass-lxc-alpine-musl-amd64.tar.gz -C stage-lxc .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-lxc-alpine-musl-amd64
          path: release/*.tar.gz

  build-gui:
    name: GUI ${{ matrix.label }}
    needs:
      - resolve-matrix
      - build-frontend
      - build-tauri-icons
    if: needs.resolve-matrix.outputs.has_gui_desktop == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.gui_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: gui-${{ matrix.label }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

      - uses: actions/download-artifact@v4
        with:
          name: tauri-icons
          path: app/src-tauri/icons

      - name: Ensure bash on Windows
        if: runner.os == 'Windows'
        run: |
          echo "C:\\Program Files\\Git\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cleanup stale cargo-tauri
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/cargo-tauri" "$HOME/.cargo/bin/tauri" \
            "$HOME/.install-action/bin/cargo-tauri" "$HOME/.install-action/bin/tauri" || true

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Prepare Tauri CI config
        working-directory: app/src-tauri
        shell: bash
        env:
          BUNDLE_ACTIVE: ${{ matrix.bundle_active }}
        run: |
          python <<'PY'
          import json
          import os
          import pathlib

          path = pathlib.Path("tauri.conf.json")
          cfg = json.loads(path.read_text())
          build = cfg.setdefault("build", {})
          build["beforeBuildCommand"] = ""
          workspace = os.environ.get("GITHUB_WORKSPACE", "")
          if workspace:
              build["frontendDist"] = str(pathlib.Path(workspace) / "app" / "frontend" / "dist")
          bundle = cfg.setdefault("bundle", {})
          bundle["active"] = os.environ.get("BUNDLE_ACTIVE", "true").lower() == "true"
          bundle["icon"] = ["icons/icon.png", "icons/icon.ico", "icons/icon.icns"]
          pathlib.Path("tauri.ci.conf.json").write_text(json.dumps(cfg))
          PY

      - name: Build GUI bundle
        working-directory: app/src-tauri
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BUNDLE_ARGS: ${{ matrix.bundle_args }}
          BUNDLE_ACTIVE: ${{ matrix.bundle_active }}
        run: |
          set -euo pipefail
          if [ "${BUNDLE_ACTIVE}" = "true" ] && [ -n "${BUNDLE_ARGS}" ]; then
            cargo tauri build --target "${TARGET}" ${BUNDLE_ARGS} --config tauri.ci.conf.json
          else
            cargo tauri build --target "${TARGET}" --config tauri.ci.conf.json
          fi

      - name: Collect GUI artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          LABEL: ${{ matrix.label }}
          PATTERN: ${{ matrix.collect_pattern }}
        run: |
          set -euo pipefail
          source .github/scripts/arch-helpers.sh
          mkdir -p release
          export package_base="$(ikb_gui_base "${TARGET}")"
          python <<'PY'
          import glob
          import os
          import pathlib
          import shutil

          release_dir = pathlib.Path("release")
          target = os.environ["TARGET"]
          pattern = os.environ["PATTERN"]
          package_base = os.environ["package_base"]

          patterns = [pattern]
          if pattern.startswith("target/release/"):
              patterns.append(f"target/{target}/release/{pattern.removeprefix('target/release/')}")

          if "windows" in target:
              patterns.extend([
                  f"target/{target}/release/ikb-app.exe",
                  f"target/{target}/release/ikuai-bypass.exe",
                  "target/release/ikb-app.exe",
                  "target/release/ikuai-bypass.exe",
              ])

          found = []
          for item in patterns:
              found.extend(glob.glob(item, recursive=True))
          found = [pathlib.Path(item) for item in found if pathlib.Path(item).is_file()]
          if not found:
              raise SystemExit(f"no bundle matched: {patterns}")

          for src in found:
              suffix = src.suffix or ".bin"
              dst = release_dir / f"{package_base}-{src.stem}{suffix}"
              shutil.copy2(src, dst)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.label }}
          path: release/*

  build-gui-android:
    name: GUI Android ${{ matrix.label }}
    needs:
      - resolve-matrix
      - build-frontend
      - build-tauri-icons
    if: needs.resolve-matrix.outputs.has_gui_android == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.gui_android_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

      - uses: actions/download-artifact@v4
        with:
          name: tauri-icons
          path: app/src-tauri/icons

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Cleanup stale cargo-tauri
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/cargo-tauri" "$HOME/.cargo/bin/tauri" \
            "$HOME/.install-action/bin/cargo-tauri" "$HOME/.install-action/bin/tauri" || true

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Prepare Tauri Android config
        working-directory: app/src-tauri
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          import pathlib

          path = pathlib.Path("tauri.conf.json")
          cfg = json.loads(path.read_text())
          build = cfg.setdefault("build", {})
          build["beforeBuildCommand"] = ""
          workspace = os.environ.get("GITHUB_WORKSPACE", "")
          if workspace:
              build["frontendDist"] = str(pathlib.Path(workspace) / "app" / "frontend" / "dist")
          bundle = cfg.setdefault("bundle", {})
          bundle["icon"] = ["icons/icon.png", "icons/icon.ico", "icons/icon.icns"]
          pathlib.Path("tauri.android.conf.json").write_text(json.dumps(cfg))
          PY

      - name: Initialize Android project if missing
        working-directory: app/src-tauri
        shell: bash
        run: |
          if [ ! -d "gen/android" ]; then
            cargo tauri android init --ci
          fi

      - name: Build Android APK
        working-directory: app/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          apk_opt=()
          if cargo tauri android build --help | grep -q -- '--apk'; then
            apk_opt+=(--apk)
          fi
          cargo tauri android build --ci --target "${{ matrix.tauri_target }}" --config tauri.android.conf.json "${apk_opt[@]}"

      - name: Package Android artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          apk="$(find app/src-tauri -type f -name '*.apk' | head -1 || true)"
          test -n "${apk}"
          cp "${apk}" "dist/ikuai-bypass-gui-${{ matrix.label }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: gui-android-${{ matrix.label }}
          path: dist/*

  build-gui-ios:
    name: GUI iOS ${{ matrix.label }}
    needs:
      - resolve-matrix
      - build-frontend
      - build-tauri-icons
    if: needs.resolve-matrix.outputs.has_gui_ios == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.gui_ios_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

      - uses: actions/download-artifact@v4
        with:
          name: tauri-icons
          path: app/src-tauri/icons

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: gui-ios-${{ matrix.label }}

      - name: Cleanup stale cargo-tauri
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/cargo-tauri" "$HOME/.cargo/bin/tauri" \
            "$HOME/.install-action/bin/cargo-tauri" "$HOME/.install-action/bin/tauri" || true

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Prepare Tauri iOS config
        working-directory: app/src-tauri
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          import pathlib

          path = pathlib.Path("tauri.conf.json")
          cfg = json.loads(path.read_text())
          build = cfg.setdefault("build", {})
          build["beforeBuildCommand"] = ""
          workspace = os.environ.get("GITHUB_WORKSPACE", "")
          if workspace:
              build["frontendDist"] = str(pathlib.Path(workspace) / "app" / "frontend" / "dist")
          bundle = cfg.setdefault("bundle", {})
          bundle_ios = bundle.setdefault("iOS", {})
          bundle_ios["developmentTeam"] = "0000000000"
          bundle["icon"] = ["icons/icon.png", "icons/icon.ico", "icons/icon.icns"]
          pathlib.Path("tauri.ios.conf.json").write_text(json.dumps(cfg))
          PY

      - name: Recreate iOS project
        working-directory: app/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          rm -rf gen/apple
          cargo tauri ios init --ci

      - name: Build iOS artifact
        working-directory: app/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          xcode_dev_dir="$(xcode-select -p)"
          default_toolchain="${xcode_dev_dir}/Toolchains/XcodeDefault.xctoolchain"
          ci_xcconfig="/tmp/ikb-ios-ci.xcconfig"
          swift_lib_paths="${default_toolchain}/usr/lib/swift/iphoneos ${default_toolchain}/usr/lib/swift-5.0/iphoneos"
          swift_ldflags="-L${default_toolchain}/usr/lib/swift/iphoneos -L${default_toolchain}/usr/lib/swift-5.0/iphoneos"
          cat > "${ci_xcconfig}" <<'XCCONFIG'
          TOOLCHAINS = com.apple.dt.toolchain.XcodeDefault
          XCCONFIG

          project_pbxproj="$(find gen/apple -type f -path '*.xcodeproj/project.pbxproj' | head -1 || true)"
          if [ -n "${project_pbxproj}" ] && [ -f "${project_pbxproj}" ]; then
            escaped_toolchain="$(printf '%s\n' "${default_toolchain}" | sed 's/[\\/&]/\\&/g')"
            perl -0777 -i -pe 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g; s/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g; s/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g; s/CODE_SIGNING_ALLOWED = [^;]*;/CODE_SIGNING_ALLOWED = NO;/g; s/CODE_SIGNING_REQUIRED = [^;]*;/CODE_SIGNING_REQUIRED = NO;/g; s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g; s/PROVISIONING_PROFILE = [^;]*;/PROVISIONING_PROFILE = "";/g;' "${project_pbxproj}"
            perl -0777 -i -pe "s/\\$\\(TOOLCHAIN_DIR\\)\\/usr\\/lib\\/swift\\//${escaped_toolchain}\\/usr\\/lib\\/swift\\//g; s/\\$\\(TOOLCHAIN_DIR\\)\\/usr\\/lib\\/swift-5\\.0\\//${escaped_toolchain}\\/usr\\/lib\\/swift-5.0\\//g;" "${project_pbxproj}"
          fi

          set +e
          if cargo tauri ios build --help | grep -q -- '--no-sign'; then
            APPLE_CERTIFICATE="" \
            APPLE_CERTIFICATE_PASSWORD="" \
            APPLE_SIGNING_IDENTITY="" \
            APPLE_TEAM_ID="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            XCODE_XCCONFIG_FILE="${ci_xcconfig}" \
            LIBRARY_SEARCH_PATHS="${swift_lib_paths}" \
            OTHER_LDFLAGS="${swift_ldflags}" \
            TOOLCHAINS="com.apple.dt.toolchain.XcodeDefault" \
            TOOLCHAIN_DIR="${default_toolchain}" \
            cargo tauri ios build --ci --target "${{ matrix.tauri_target }}" --config tauri.ios.conf.json --no-sign | tee /tmp/xcodebuild-ios.log
          else
            APPLE_CERTIFICATE="" \
            APPLE_CERTIFICATE_PASSWORD="" \
            APPLE_SIGNING_IDENTITY="" \
            APPLE_TEAM_ID="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            XCODE_XCCONFIG_FILE="${ci_xcconfig}" \
            LIBRARY_SEARCH_PATHS="${swift_lib_paths}" \
            OTHER_LDFLAGS="${swift_ldflags}" \
            TOOLCHAINS="com.apple.dt.toolchain.XcodeDefault" \
            TOOLCHAIN_DIR="${default_toolchain}" \
            cargo tauri ios build --ci --target "${{ matrix.tauri_target }}" --config tauri.ios.conf.json | tee /tmp/xcodebuild-ios.log
          fi
          build_exit="${PIPESTATUS[0]}"
          set -e

          if [ "${build_exit}" -ne 0 ]; then
            if grep -Eq 'exportArchive No Team Found in Archive|failed to export iOS app|EXPORT FAILED' /tmp/xcodebuild-ios.log; then
              echo "::warning::Ignoring export failure for unsigned build; fallback to .app packaging."
            else
              exit "${build_exit}"
            fi
          fi

      - name: Package iOS artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ipa="$(find app/src-tauri -type f -name '*.ipa' | head -1 || true)"
          if [ -n "${ipa}" ] && [ -f "${ipa}" ]; then
            cp "${ipa}" "dist/ikuai-bypass-gui-${{ matrix.label }}.ipa"
            exit 0
          fi

          app="$(find app/src-tauri -type d -name '*.app' | head -1 || true)"
          test -n "${app}"
          rm -rf /tmp/ios-payload
          mkdir -p /tmp/ios-payload/Payload
          cp -R "${app}" /tmp/ios-payload/Payload/
          (cd /tmp/ios-payload && zip -r -q unsigned.ipa Payload)
          cp /tmp/ios-payload/unsigned.ipa "dist/ikuai-bypass-gui-${{ matrix.label }}.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: gui-ios-${{ matrix.label }}
          path: dist/*

      - name: Upload iOS build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ matrix.label }}
          path: |
            /tmp/xcodebuild-ios.log
            app/src-tauri/gen/apple/build/**/Logs/**
          if-no-files-found: ignore

  build-bsd:
    name: CLI ${{ matrix.label }}
    needs:
      - resolve-matrix
      - verify-cli
    if: needs.resolve-matrix.outputs.has_bsd == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.bsd_matrix) }}
    env:
      CARGO_TARGET_DIR: target-bsd-${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        if: matrix.vm_os == 'freebsd'
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            set -euo pipefail
            pkg install -y bash curl gcc gmake pkgconf perl5
            export PATH="/usr/local/bin:${PATH}"
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
            . "$HOME/.cargo/env"
            rustup target add "${{ matrix.target }}"
            export CARGO_TARGET_DIR="${{ env.CARGO_TARGET_DIR }}"
            cargo build --locked --release --target "${{ matrix.target }}" -p ikb-cli

      - name: Package BSD artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          source .github/scripts/arch-helpers.sh
          mkdir -p release
          export package_base="$(ikb_cli_base "${TARGET}")"
          python <<'PY'
          import os
          import pathlib
          import shutil
          import tarfile

          target = os.environ["TARGET"]
          package_base = os.environ["package_base"]
          release_dir = pathlib.Path("release")
          build_root = pathlib.Path(os.environ["CARGO_TARGET_DIR"])
          build_dir = build_root / target / "release"
          src = build_dir / "ikb-cli"
          if not src.exists():
              raise SystemExit(f"missing binary: {src}")

          stage = release_dir / f"{package_base}.stage"
          if stage.exists():
              shutil.rmtree(stage)
          stage.mkdir(parents=True)
          shutil.copy2(src, stage / "ikuai-bypass")
          shutil.copy2("README.md", stage / "README.md")
          shutil.copy2("config.yml", stage / "config.yml")

          out = release_dir / f"{package_base}.tar.gz"
          if out.exists():
              out.unlink()
          with tarfile.open(out, "w:gz") as tf:
              for path in stage.rglob("*"):
                  tf.add(path, arcname=path.relative_to(stage))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.label }}
          path: release/*

  docker:
    name: Docker Multi-Arch
    needs:
      - resolve-matrix
      - build-cli
      - build-frontend
    if: needs.resolve-matrix.outputs.push_docker == 'true' && needs.resolve-matrix.outputs.docker_creds_available == 'true' && needs.resolve-matrix.outputs.docker_platforms != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-linux-*
          path: release
          merge-multiple: true

      - name: Prepare Docker build context
        env:
          DOCKER_CLI_JSON: ${{ needs.resolve-matrix.outputs.docker_cli_matrix }}
        run: bash .github/scripts/prepare-container-binaries.sh release .docker-release/multiarch

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ needs.resolve-matrix.outputs.version }}
            type=raw,value=latest,enable=${{ needs.resolve-matrix.outputs.docker_latest == 'true' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./.docker-release/multiarch
          file: ./.docker-release/multiarch/Dockerfile
          platforms: ${{ needs.resolve-matrix.outputs.docker_platforms }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha,scope=docker-multiarch
          cache-to: type=gha,mode=max,scope=docker-multiarch

  publish:
    name: Publish Release
    needs:
      - resolve-matrix
      - build-cli
      - build-cli-nightly
      - build-lxc
      - build-gui
      - build-gui-android
      - build-gui-ios
      - build-bsd
    if: ${{ always() && needs.resolve-matrix.outputs.publish_release == 'true' && !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release
          pattern: "*"
          merge-multiple: true

      - name: Show release files
        run: find release -maxdepth 2 -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-matrix.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
          prerelease: ${{ needs.resolve-matrix.outputs.prerelease == 'true' }}
