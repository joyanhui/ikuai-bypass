name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布版本号，例如 v0.1.0 或 v0.1.0-beta.1；留空则自动生成 manually_年月日时分秒"
        required: false
        type: string
      publish_release:
        description: "是否发布 GitHub Release"
        required: true
        type: boolean
        default: true
      push_docker:
        description: "是否推送 Docker 镜像"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  APP_NAME: ikuai-bypass
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'joyanhui/ikuai-bypass' }}

jobs:
  meta:
    name: Resolve Release Meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      push_docker: ${{ steps.meta.outputs.push_docker }}
      is_tag_build: ${{ steps.meta.outputs.is_tag_build }}
      docker_latest: ${{ steps.meta.outputs.docker_latest }}
      docker_creds_available: ${{ steps.meta.outputs.docker_creds_available }}
    steps:
      - id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          INPUT_PUBLISH_RELEASE: ${{ github.event.inputs.publish_release || 'true' }}
          INPUT_PUSH_DOCKER: ${{ github.event.inputs.push_docker || 'true' }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "push" ]]; then
            version="${REF_NAME}"
            publish_release="true"
            push_docker="true"
            is_tag_build="true"
          else
            version="${INPUT_RELEASE_TAG}"
            publish_release="${INPUT_PUBLISH_RELEASE}"
            push_docker="${INPUT_PUSH_DOCKER}"
            if [[ -z "${version}" ]]; then
              version="manually_$(date +%Y%m%d%H%M%S)"
            fi
            is_tag_build="true"
          fi

          tag_name="${version}"

          lc_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]')"
          prerelease="false"
          if printf '%s' "${lc_version}" | grep -Eq '(alpha|beta|rc|pre|preview|dev|nightly|test|manually)'; then
            prerelease="true"
          fi

          docker_latest="false"
          if [[ "${prerelease}" != "true" && "${tag_name}" =~ ^v[0-9]+(\.[0-9]+){1,2}$ ]]; then
            docker_latest="true"
          fi

          docker_creds_available="false"
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            docker_creds_available="true"
          fi

          if [[ "${push_docker}" == "true" && "${docker_creds_available}" != "true" ]]; then
            echo "Docker credentials are required when push_docker=true" >&2
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag_name=${tag_name}"
            echo "prerelease=${prerelease}"
            echo "publish_release=${publish_release}"
            echo "push_docker=${push_docker}"
            echo "is_tag_build=${is_tag_build}"
            echo "docker_latest=${docker_latest}"
            echo "docker_creds_available=${docker_creds_available}"
          } >> "${GITHUB_OUTPUT}"

  build-cli:
    name: CLI ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-amd64
            target: x86_64-unknown-linux-musl
            package_suffix: linux-amd64
            use_cross: true
            package_format: zip
            extra_package_suffix: lxc-alpine-musl-amd64
            extra_package_format: tar.gz
          - runner: ubuntu-latest
            label: linux-386
            target: i686-unknown-linux-musl
            package_suffix: linux-386
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: linux-arm5
            target: armv5te-unknown-linux-musleabi
            package_suffix: linux-arm5
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: linux-arm6
            target: arm-unknown-linux-musleabi
            package_suffix: linux-arm6
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: linux-arm7
            target: armv7-unknown-linux-musleabihf
            package_suffix: linux-arm7
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: linux-arm64
            target: aarch64-unknown-linux-musl
            package_suffix: linux-arm64
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: linux-ppc64le
            target: powerpc64le-unknown-linux-musl
            package_suffix: linux-ppc64le
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: linux-riscv64
            target: riscv64gc-unknown-linux-musl
            package_suffix: linux-riscv64
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: freebsd-386
            target: i686-unknown-freebsd
            package_suffix: freebsd-386
            use_cross: true
            package_format: zip
          - runner: ubuntu-latest
            label: freebsd-amd64
            target: x86_64-unknown-freebsd
            package_suffix: freebsd-amd64
            use_cross: true
            package_format: zip
          - runner: windows-latest
            label: windows-386
            target: i686-pc-windows-msvc
            package_suffix: windows-386
            use_cross: false
            package_format: zip
          - runner: windows-latest
            label: windows-amd64
            target: x86_64-pc-windows-msvc
            package_suffix: windows-amd64
            use_cross: false
            package_format: zip
          - runner: macos-15-intel
            label: darwin-amd64
            target: x86_64-apple-darwin
            package_suffix: darwin-amd64
            use_cross: false
            package_format: zip
          - runner: macos-15
            label: darwin-arm64
            target: aarch64-apple-darwin
            package_suffix: darwin-arm64
            use_cross: false
            package_format: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Add native rust target
        if: ${{ !matrix.use_cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Add cross targets
        if: runner.os == 'Linux' && matrix.use_cross
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: runner.os == 'Linux' && matrix.use_cross
        run: cargo install cross --locked

      - name: Install UPX
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Install UPX
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: Build CLI with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --target ${{ matrix.target }} -p ikb-cli

      - name: Build CLI with cross
        if: matrix.use_cross
        run: cross build --locked --release --target ${{ matrix.target }} -p ikb-cli

      - name: Package CLI artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PACKAGE_SUFFIX: ${{ matrix.package_suffix }}
          PACKAGE_FORMAT: ${{ matrix.package_format }}
          EXTRA_PACKAGE_SUFFIX: ${{ matrix.extra_package_suffix || '' }}
          EXTRA_PACKAGE_FORMAT: ${{ matrix.extra_package_format || '' }}
        run: |
          mkdir -p release
          python <<'PY'
          import os
          import pathlib
          import subprocess
          import shutil
          import tarfile
          import zipfile

          target = os.environ["TARGET"]
          suffix = os.environ["PACKAGE_SUFFIX"]
          package_format = os.environ["PACKAGE_FORMAT"]
          extra_suffix = os.environ["EXTRA_PACKAGE_SUFFIX"]
          extra_format = os.environ["EXTRA_PACKAGE_FORMAT"]
          release_dir = pathlib.Path("release")
          build_dir = pathlib.Path("target") / target / "release"
          src = build_dir / ("ikb-cli.exe" if "windows" in target else "ikb-cli")
          if not src.exists():
              raise SystemExit(f"missing binary: {src}")

          stage = release_dir / f"ikuai-bypass-{suffix}"
          if stage.exists():
              shutil.rmtree(stage)
          stage.mkdir(parents=True)

          dst = stage / ("ikuai-bypass.exe" if "windows" in target else "ikuai-bypass")
          shutil.copy2(src, dst)

          upx = shutil.which("upx")
          if upx:
              try:
                  subprocess.run([upx, "-9", str(dst)], check=True)
              except subprocess.CalledProcessError:
                  print(f"UPX unsupported for {target}, keep original binary.")

          shutil.copy2("README.md", stage / "README.md")
          shutil.copy2("config.yml", stage / "config.yml")

          def pack(stage_dir: pathlib.Path, out_suffix: str, out_format: str) -> None:
              if out_format == "tar.gz":
                  tar_path = release_dir / f"ikuai-bypass-{out_suffix}.tar.gz"
                  if tar_path.exists():
                      tar_path.unlink()
                  with tarfile.open(tar_path, "w:gz") as tf:
                      for path in stage_dir.rglob("*"):
                          tf.add(path, arcname=path.relative_to(stage_dir))
              else:
                  zip_path = release_dir / f"ikuai-bypass-{out_suffix}.zip"
                  if zip_path.exists():
                      zip_path.unlink()
                  with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=5) as zf:
                      for path in stage_dir.rglob("*"):
                          zf.write(path, path.relative_to(stage_dir))

          pack(stage, suffix, package_format)

          if extra_suffix and extra_format:
              extra_stage = release_dir / f"ikuai-bypass-{extra_suffix}"
              if extra_stage.exists():
                  shutil.rmtree(extra_stage)
              shutil.copytree(stage, extra_stage)
              pack(extra_stage, extra_suffix, extra_format)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.package_suffix }}
          path: |
            release/*.zip
            release/*.tar.gz

  build-gui:
    name: GUI ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            label: windows-x86_64
            bundle_args: --bundles nsis,msi
            collect_pattern: target/release/bundle/**/*.msi|target/release/bundle/**/*.exe
          - runner: ubuntu-22.04
            label: linux-x86_64-appimage
            bundle_args: --bundles appimage
            collect_pattern: target/release/bundle/**/*.AppImage
          - runner: macos-15-intel
            label: macos-x86_64
            bundle_args: --bundles dmg
            collect_pattern: target/release/bundle/**/*.dmg
          - runner: macos-15
            label: macos-aarch64
            bundle_args: --bundles dmg
            collect_pattern: target/release/bundle/**/*.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            app/frontend/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('app/frontend/bun.lock', 'app/frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build GUI bundle
        run: cargo tauri build --manifest-path app/src-tauri/Cargo.toml ${{ matrix.bundle_args }}

      - name: Collect GUI artifacts
        shell: bash
        env:
          LABEL: ${{ matrix.label }}
          PATTERN: ${{ matrix.collect_pattern }}
        run: |
          mkdir -p release
          python <<'PY'
          import glob
          import os
          import pathlib
          import shutil

          release_dir = pathlib.Path("release")
          patterns = [p for p in os.environ["PATTERN"].split("|") if p]
          found = []
          for pattern in patterns:
              found.extend(glob.glob(pattern, recursive=True))
          if not found:
              raise SystemExit(f"no bundle matched: {patterns}")

          for item in found:
              src = pathlib.Path(item)
              dst = release_dir / f"{os.environ['LABEL']}-{src.name}"
              shutil.copy2(src, dst)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.label }}
          path: release/*

  docker:
    name: Docker Multi-Arch
    needs:
      - meta
      - build-cli
    if: needs.meta.outputs.push_docker == 'true' && needs.meta.outputs.docker_creds_available == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            app/frontend/node_modules
          key: docker-bun-${{ hashFiles('app/frontend/bun.lock', 'app/frontend/package.json') }}
          restore-keys: |
            docker-bun-

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: bun install --frozen-lockfile

      - name: Build frontend dist
        working-directory: app/frontend
        run: bun run build

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-linux-*
          path: release
          merge-multiple: true

      - name: Prepare Docker build context
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .docker-release
          ctx=".docker-release/multiarch"
          mkdir -p "${ctx}/docker/app/frontend" "${ctx}/docker/bin"
          cp Dockerfile docker-entrypoint.sh config.yml "${ctx}/"
          cp -R app/frontend/dist "${ctx}/docker/app/frontend/dist"
          for label in linux-amd64 linux-386 linux-arm64 linux-arm7 linux-arm6 linux-ppc64le linux-riscv64; do
            mkdir -p "${ctx}/docker/bin/${label}"
            unzip -q "release/ikuai-bypass-${label}.zip" -d "${ctx}/unpack-${label}"
            cp "${ctx}/unpack-${label}/ikuai-bypass" "${ctx}/docker/bin/${label}/ikuai-bypass"
            chmod +x "${ctx}/docker/bin/${label}/ikuai-bypass"
          done
          chmod +x "${ctx}/docker-entrypoint.sh"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ needs.meta.outputs.version }}
            type=raw,value=latest,enable=${{ needs.meta.outputs.docker_latest == 'true' }}

      - name: Build and push single-tag multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./.docker-release/multiarch
          file: ./.docker-release/multiarch/Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/ppc64le,linux/riscv64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha,scope=docker-multiarch
          cache-to: type=gha,mode=max,scope=docker-multiarch

  publish:
    name: Publish Release
    needs:
      - meta
      - build-cli
      - build-gui
    if: needs.meta.outputs.publish_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release
          pattern: "*"
          merge-multiple: true

      - name: Show release files
        run: find release -maxdepth 2 -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
          prerelease: ${{ needs.meta.outputs.prerelease == 'true' }}
