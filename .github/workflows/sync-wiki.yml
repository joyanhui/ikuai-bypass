name: Sync Wiki
on:
  push:
    branches: [ main ]
    paths:
      - 'docs-ikb-wiki/**'

permissions:
  contents: read

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync and commit to wiki
        shell: bash
        run: |
          rsync -av --delete docs-ikb-wiki/ wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "${{ github.event.head_commit.message || 'docs: sync wiki from main repo' }}"
            git push
          fi
