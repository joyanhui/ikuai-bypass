title: iKuai Bypass
description: 爱快路由器专用的分流规则自动同步工具
baseurl: /ikuai-bypass
url: https://joyanhui.github.io
remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-relative-links

search_enabled: true

# Favicon
favicon_ico: "/favicon.ico"

# Mermaid support (just-the-docs built-in)
mermaid:
  version: "10.9.0"

# Enable right-side TOC (built-in in v0.12)
toc: true

# Color scheme: default follows system preference, toggle via JS sets data-theme
color_scheme: nil

# Permalink format
permalink: /:path/

# Include processing
include:
  - .htaccess

# Footer
footer_content: "Copyright &copy; 2026 iKuai Bypass. Powered by Jekyll &amp; Just the Docs."

# Back to top
back_to_top: true
back_to_top_text: "回到顶部"

# Heading anchors
heading_anchors: true

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/joyanhui/ikuai-bypass"
  "Releases":
    - "https://github.com/joyanhui/ikuai-bypass/releases"

# Edit link (optional)
gh_edit_link: true
gh_edit_link_text: "在 GitHub 上编辑此页"
gh_edit_repository: "https://github.com/joyanhui/ikuai-bypass"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Callouts (Just the Docs feature)
callouts:
  tip:
    title: 提示
    color: purple
  warning:
    title: 警告
    color: red
  note:
    title: 注意
    color: blue
