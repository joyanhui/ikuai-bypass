{% if page.mermaid %}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
<script>
(function() {
  'use strict';

  function getTheme() {
    return document.documentElement.getAttribute('data-skin') === 'dark' ? 'dark' : 'default';
  }

  async function renderAll() {
    if (typeof mermaid === 'undefined') return;
    mermaid.initialize({ startOnLoad: false, theme: getTheme() });
    const containers = document.querySelectorAll('.mermaid-container');
    for (let i = 0; i < containers.length; i++) {
      const div = containers[i];
      const source = div.dataset.source;
      if (!source) continue;
      const id = 'mermaid-' + Date.now() + '-' + i;
      try {
        const result = await mermaid.render(id, source);
        div.innerHTML = result.svg;
      } catch (err) {
        div.innerHTML = '<div style="color:var(--text-danger,#c00);padding:1rem;border:1px solid currentColor;border-radius:4px">Mermaid error: ' + err.message + '</div>';
      }
    }
  }

  function prepare() {
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(code) {
      var pre = code.parentNode;
      var div = document.createElement('div');
      div.className = 'mermaid-container';
      div.dataset.source = code.textContent;
      pre.parentNode.replaceChild(div, pre);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    prepare();
    renderAll();
  });

  new MutationObserver(function() {
    renderAll();
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-skin'] });
})();
</script>
{% endif %}
