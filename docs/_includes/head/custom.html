{% if page.mermaid %}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
<script>
(function() {
  'use strict';

  function getTheme() {
    return document.documentElement.getAttribute('data-skin') === 'dark' ? 'dark' : 'default';
  }

  async function renderAll() {
    if (typeof mermaid === 'undefined') return;
    mermaid.initialize({
      startOnLoad: false,
      theme: getTheme()
    });
    var containers = document.querySelectorAll('.mermaid-container');
    for (var i = 0; i < containers.length; i++) {
      var div = containers[i];
      var source = div.dataset.source;
      if (!source) continue;
      var id = 'mermaid-' + Date.now() + '-' + i;
      try {
        var result = await mermaid.render(id, source);
        div.innerHTML = result.svg;
      } catch (err) {
        div.innerHTML = '<div style="color:var(--text-danger,#c00);padding:1rem;border:1px solid currentColor;border-radius:4px">Mermaid error: ' + err.message + '</div>';
      }
    }
    // White text with dark outline for subgraph labels, readable on any fill
    var shadow = '-0.5px -0.5px 0 #222, 0.5px -0.5px 0 #222, -0.5px 0.5px 0 #222, 0.5px 0.5px 0 #222';
    containers.forEach(function(div) {
      // Select: subgraph label spans inside cluster groups
      div.querySelectorAll('g.cluster foreignObject span, g[class*="cluster"] foreignObject span, foreignObject span[style*="FFF"], foreignObject span[style*="fff"]').forEach(function(sp) {
        sp.style.setProperty('color', '#fff', 'important');
        sp.style.setProperty('text-shadow', shadow, 'important');
        sp.style.setProperty('font-weight', '600', 'important');
      });
    });
  }

  function prepare() {
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(code) {
      var pre = code.parentNode;
      var div = document.createElement('div');
      div.className = 'mermaid-container';
      div.dataset.source = code.textContent;
      pre.parentNode.replaceChild(div, pre);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    prepare();
    renderAll();
  });

  new MutationObserver(function() {
    renderAll();
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-skin'] });
})();
</script>
{% endif %}
