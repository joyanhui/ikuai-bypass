<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iKuai Bypass</title>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      fetch('/api/v1/plugins/bypass/api/config')
        .then(r => r.json())
        .then(config => {
          document.getElementById('status').textContent = 'Connected to iKuai Bypass plugin';
          document.getElementById('config').textContent = JSON.stringify(config, null, 2);
        })
        .catch(err => {
          document.getElementById('status').textContent = 'Failed to connect: ' + err.message;
        });
    });
  </script>
</head>
<body>
  <h1>iKuai Bypass</h1>
  <p id="status">Loading...</p>
  <pre id="config"></pre>
</body>
</html>
